name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Require RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            echo "::error::Missing secret RELEASE_TOKEN. Create a fine-grained PAT from a repo Administrator (Contents: Read and write) and add it as repository secret RELEASE_TOKEN. See docs/RELEASE.md § Release bot (RELEASE_TOKEN)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Must be an Administrator PAT so ruleset bypass (RepositoryRole admin) applies.
          # Default GITHUB_TOKEN cannot bypass "Protect main" on user-owned repos.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        run: |
          before="$(node -p "require('./package.json').version")"
          npx release-it --ci --no-git.push --no-github.release
          after="$(node -p "require('./package.json').version")"
          echo "version=${after}" >> "${GITHUB_OUTPUT}"
          if [ "${before}" = "${after}" ]; then
            echo "released=false" >> "${GITHUB_OUTPUT}"
            echo "No version bump (nothing to release)."
          else
            echo "released=true" >> "${GITHUB_OUTPUT}"
            echo "Bumped ${before} → ${after}"
          fi

      # Push commit first, then tag — never publish a Packagist tag if main rejects the commit.
      - name: Push release commit and tag
        if: steps.release.outputs.released == 'true'
        run: |
          git push origin "HEAD:main"
          git push origin "v${{ steps.release.outputs.version }}"

      - name: Create GitHub Release
        if: steps.release.outputs.released == 'true'
        run: gh release create "v${{ steps.release.outputs.version }}" --title "Release ${{ steps.release.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

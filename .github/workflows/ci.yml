name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smoke on feature PRs; full matrix only for release PRs targeting main.
  matrix:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo 'include=[{"php":"8.2","laravel":"11.*","testbench":"9.*"},{"php":"8.2","laravel":"12.*","testbench":"10.*"},{"php":"8.3","laravel":"11.*","testbench":"9.*"},{"php":"8.3","laravel":"12.*","testbench":"10.*"},{"php":"8.3","laravel":"13.*","testbench":"11.*"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'include=[{"php":"8.3","laravel":"12.*","testbench":"10.*"}]' >> "$GITHUB_OUTPUT"
          fi

  phpunit:
    name: phpunit (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-tb${{ matrix.testbench }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-tb${{ matrix.testbench }}-
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer config --global audit.block-insecure false
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: composer test

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

  ci:
    name: CI
    if: always()
    needs: [phpunit, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Require phpunit and frontend success
        run: |
          [[ "${{ needs.phpunit.result }}" == "success" && "${{ needs.frontend.result }}" == "success" ]]
